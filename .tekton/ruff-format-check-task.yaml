---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ruff-format-check
  labels:
    app: platform-frontend-ai-dev
spec:
  description: Check Python code formatting with ruff
  params:
    - name: SOURCE_DIR
      description: Path to the source code directory
      default: "."
      type: string
  workspaces:
    - name: source
      description: Workspace containing the source code
  steps:
    - name: check-formatting
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "Installing ruff..."
        microdnf install -y python3-pip
        pip3 install ruff

        cd "$(params.SOURCE_DIR)"

        echo "Checking Python code formatting with ruff..."
        ruff format --check .

        if [ $? -eq 0 ]; then
          echo "All Python files are properly formatted"
        else
          echo "Formatting errors found. Run 'ruff format .' locally to fix."
          exit 1
        fi
